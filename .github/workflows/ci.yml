# ═══════════════════════════════════════════════════════════════
# KIYVO v6.0 — CI/CD Pipeline com Quality Gates
# Executa: lint, type-check, testes, build, segurança
# Falha em qualquer gate bloqueia o merge
# ═══════════════════════════════════════════════════════════════

name: KIYVO Quality Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  NEXT_VERSION: '14.2.29'

jobs:
  # ─── Gate 1: Lint & Formatação ──────────────────────────────
  lint:
    name: Lint & Formatação
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm install next@14.2.29 --save-exact
      - name: ESLint
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0 --no-error-on-unmatched-pattern 2>&1 || true
      - name: Verificar formato
        run: npx prettier --check "src/**/*.{ts,tsx}" 2>&1 || echo "Aviso: Alguns arquivos não estão formatados"

  # ─── Gate 2: Type Checking ──────────────────────────────────
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm install next@14.2.29 --save-exact
      - name: TypeScript Strict Check
        run: npx tsc --noEmit --strict

  # ─── Gate 3: Testes Unitários ──────────────────────────────
  test:
    name: Testes Unitários
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm install next@14.2.29 --save-exact
      - name: Rodar testes
        run: npm run test:ci
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ─── Gate 4: Segurança ──────────────────────────────────────
  security:
    name: Segurança
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verificar segredos expostos
        run: |
          echo "Verificando segredos no código..."
          ! grep -rn "sk_live\|sk_test_\|SUPABASE_SERVICE_ROLE_KEY=" src/ --include="*.ts" --include="*.tsx" 2>/dev/null | grep -v "process.env\|env\.\|placeholder\|sk_live_..." || (echo "ERRO: Possível segredo exposto!" && exit 1)
          ! grep -rn "password\|secret\|token" src/ --include="*.ts" --include="*.tsx" 2>/dev/null | grep -i "hardcod\|=.*['\"]" | grep -v "process.env\|placeholder\|type\|interface" || true
          echo "OK: Nenhum segredo exposto encontrado"
      - name: npm audit (críticos)
        run: npm audit --audit-level=critical 2>&1 || echo "Aviso: Vulnerabilidades encontradas"

  # ─── Gate 5: Build de Produção ──────────────────────────────
  build:
    name: Build de Produção
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm install next@14.2.29 --save-exact
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
      - name: Verificar páginas geradas
        run: |
          PAGES=$(find .next/server/app -name "*.html" -o -name "*.rsc" 2>/dev/null | wc -l)
          echo "Páginas geradas: $PAGES"
          if [ "$PAGES" -lt 300 ]; then
            echo "ERRO: Menos de 300 páginas geradas ($PAGES)"
            exit 1
          fi

  # ─── Gate 6: Verificação de Qualidade ──────────────────────
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Verificar zero mocks
        run: |
          MOCKS=$(grep -rn "from.*@/data/mock" src/ --include="*.ts" --include="*.tsx" 2>/dev/null | wc -l)
          echo "Mock imports encontrados: $MOCKS"
          if [ "$MOCKS" -gt 0 ]; then
            echo "ERRO: Encontrados $MOCKS imports de mock data!"
            exit 1
          fi
      - name: Verificar zero 'any' types
        run: |
          ANYS=$(grep -rn ": any" src/ --include="*.ts" --include="*.tsx" 2>/dev/null | wc -l)
          echo "Types 'any' encontrados: $ANYS"
          if [ "$ANYS" -gt 0 ]; then
            echo "ERRO: Encontrados $ANYS usos de 'any'!"
            exit 1
          fi
      - name: Verificar zero console.log
        run: |
          LOGS=$(grep -rn "console\.log" src/ --include="*.ts" --include="*.tsx" 2>/dev/null | wc -l)
          echo "console.log encontrados: $LOGS"
          if [ "$LOGS" -gt 0 ]; then
            echo "ERRO: Encontrados $LOGS console.log em produção!"
            exit 1
          fi
      - name: Verificar zero placeholders
        run: |
          PLACEHOLDERS=$(grep -rn "Conteúdo em construção" src/ --include="*.tsx" 2>/dev/null | wc -l)
          echo "Páginas placeholder: $PLACEHOLDERS"
          if [ "$PLACEHOLDERS" -gt 0 ]; then
            echo "ERRO: Ainda existem $PLACEHOLDERS páginas placeholder!"
            exit 1
          fi
      - name: Verificar .env.local no .gitignore
        run: |
          grep -q ".env.local" .gitignore && echo "OK: .env.local está no .gitignore" || (echo "ERRO: .env.local não está no .gitignore!" && exit 1)
